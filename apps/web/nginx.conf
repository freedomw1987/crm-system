# CRM Web — nginx config
# Serves SPA + reverse-proxies /api to api:3001

# Upstream — Docker service name
upstream crm_api {
    server api:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 1024;

    # Health check endpoint
    location = /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # API reverse proxy
    location /api/ {
        # Strip /api prefix; backend routes don't have it
        rewrite ^/api/(.*)$ /$1 break;

        proxy_pass http://crm_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Reasonable timeouts for AI agent calls (up to 60s)
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Don't buffer SSE/streaming responses
        proxy_buffering off;
        proxy_cache off;
    }

    # Static assets — long cache
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — all unmatched routes go to index.html.
    # We use an explicit named location for index.html to avoid the
    # rewrite cycle that occurs with `try_files ... /index.html` when
    # /index.html is itself matched by `location /`.
    location / {
        try_files $uri $uri/ @spa;
    }
    location @spa {
        root /usr/share/nginx/html;
        try_files /index.html =404;
    }
}
