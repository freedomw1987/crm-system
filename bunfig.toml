[install]
# P0-5 (2026-06-07 review): was 'exact = false' which allowed caret
# ranges in package.json. Combined with bun.lock not being in npm's
# lockfile format, that meant dependency drift was invisible to
# 'npm audit' / 'snyk test' and could ship unreviewed transitive
# versions on every install. Switch to exact pinning so lockfile
# drift becomes a build-time error.
exact = true

[install.cache]
# 2026-06-26 hardening: was `disable = false` (default). Inside
# Docker BuildKit layer caches, Bun's install cache can hold a
# partial registry snapshot from a prior resolver run; with
# `--frozen-lockfile`, a mismatch between that stale snapshot
# and the live registry manifests can produce spurious
# "No version matching X.Y.Z found (but package exists)" errors
# (P1-11). Disabling the cache forces every install to hit the
# registry, which adds ~30s to a cold Docker build but makes
# the install fully deterministic.
disable = true
