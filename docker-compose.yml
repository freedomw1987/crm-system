# ====================================================================
# CRM System — Docker Compose (local deployment)
# Single host: postgres + api + web (nginx) + adminer
# ====================================================================

services:
  # ---------- PostgreSQL ----------
  postgres:
    image: postgres:16-alpine
    container_name: crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crm_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-crm_system}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm_system}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not exposed to host in prod (only accessible to api container)
    # Override in docker-compose.override.yml or uncomment to expose:
    # ports:
    #   - "5432:5432"

  # ---------- API (Bun + Elysia + Prisma) ----------
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: crm-api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-crm}:${POSTGRES_PASSWORD:-crm_dev_password}@postgres:5432/${POSTGRES_DB:-crm_system}?schema=public
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please-use-long-random-string}
      # AI Assistant configuration is now entirely admin-controlled via
      # the /admin/ai-config page (AiConfig DB row). We deliberately
      # do NOT inject OPENAI_API_KEY / OPENAI_MODEL here — those would
      # be server-side env fallbacks that the admin cannot override
      # from the UI, which violates David's T2 spec ("API KEY, Endpoint,
      # Model are user-configurable; not stored in 1, 2, or 3").
      # AI_CONFIG_ENCRYPTION_KEY is the DB-encryption master key for
      # the user-supplied api key (AES-256-GCM). It MUST be set in
      # .env (32-byte hex). Generate one with:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      AI_CONFIG_ENCRYPTION_KEY: ${AI_CONFIG_ENCRYPTION_KEY:?AI_CONFIG_ENCRYPTION_KEY must be set in .env}
      NODE_ENV: production
      PORT: 3001
      HOST: 0.0.0.0
      # Set SEED_DB=true on first run to seed admin users
      SEED_DB: ${SEED_DB:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    # Exposed via nginx reverse proxy (web service)
    expose:
      - "3001"
    volumes:
      # Day N: uploaded attachments persist on the host. The api
      # container's Dockerfile pre-creates the directory so the bun
      # process can write immediately.
      - crm_uploads:/app/data/uploads

  # ---------- Web (nginx serving SPA + reverse proxy /api) ----------
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: crm-web
    restart: unless-stopped
    depends_on:
      api:
        condition: service_started
    ports:
      - "${WEB_PORT:-80}:80"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ---------- Adminer (DB admin UI) — opt-in via PROFILE=with-adminer ----------
  adminer:
    image: adminer:4.8.1
    container_name: crm-adminer
    restart: unless-stopped
    profiles: ["with-adminer"]
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "${ADMINER_PORT:-8080}:8080"
    depends_on:
      - postgres

  # ---------- Backup (scheduled pg_dump to host volume) ----------
  # Disabled by default — start with: docker compose --profile backup up -d
  # Or run manually: ./scripts/backup.sh
  backup:
    image: postgres:16-alpine
    container_name: crm-backup
    profiles: ["backup"]
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - |
        set -e
        if [ -f /var/backups/skip ]; then
          echo "skip file present, exiting"; exit 0
        fi
        mkdir -p /var/backups
        # Cron schedule: every day at 02:00 server time
        echo "0 2 * * * /usr/local/bin/backup.sh >> /proc/1/fd/1 2>&1" > /etc/crontabs/root
        # First run immediately so you don't have to wait until 02:00 to verify
        /usr/local/bin/backup.sh
        # Then keep container alive serving cron in foreground
        crond -f -L /dev/stdout
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-crm_dev_password}
      POSTGRES_HOST: postgres
      POSTGRES_DB: ${POSTGRES_DB:-crm_system}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      BACKUP_KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    volumes:
      - ./backups:/var/backups
      - ./scripts/backup-container.sh:/usr/local/bin/backup.sh:ro
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
    name: crm_pgdata
  crm_uploads:
    name: crm_uploads
